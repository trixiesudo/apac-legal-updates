services:
  - type: web
    name: apac-legal-updates-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: LEGAL_UPDATES_PUBLIC_MODE
        value: "false"
      - key: LEGAL_UPDATES_ENABLE_SCHEDULER
        value: "false"
      - key: LEGAL_UPDATES_CORS_ORIGINS
        value: https://trixiesudo.github.io,http://127.0.0.1:5173,http://localhost:5173
